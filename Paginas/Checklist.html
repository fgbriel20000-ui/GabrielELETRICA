<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist | Elétrica Profissional</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="corrente.html" class="nav-btn">Corrente</a>
                <a href="potencia.html" class="nav-btn">Potência</a>
                <a href="queda-tensao.html" class="nav-btn">Queda Tensão</a>
                <a href="bitola-cabo.html" class="nav-btn">Bitola Cabo</a>
                <a href="disjuntor.html" class="nav-btn">Disjuntor</a>
                <a href="consumo.html" class="nav-btn">Consumo</a>
                <a href="demanda.html" class="nav-btn">Demanda</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="conversor.html" class="nav-btn">Conversor</a>
                <a href="cargas.html" class="nav-btn">Cargas</a>
                <a href="orcamento.html" class="nav-btn">Orçamento</a>
                <a href="recibo.html" class="nav-btn">Recibo</a>
                <a href="checklist.html" class="nav-btn active">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-list-check card-icon"></i>
                    <h3 class="card-title">Checklist de Execução e Segurança</h3>
                </div>
                <div class="space-y-4">
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Verificar tensão da concessionária antes do início
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Desligar a chave geral durante a instalação
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Conferir bitola dos cabos conforme NBR 5410
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Verificar aterramento e continuidade
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Fixar e proteger condutos corretamente
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Identificar todos os circuitos no quadro
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Testar funcionamento de cada tomada e ponto de luz
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Verificar funcionamento do DR (Dispositivo Diferencial Residual)
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Entregar diagrama simplificado ao cliente
                    </label>
                    <label class="flex gap-3 items-center text-lg">
                        <input type="checkbox" class="accent-yellow-400 w-5 h-5">
                        Usar EPIs conforme NR‑10
                    </label>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
