<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor | Elétrica Profissional</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="corrente.html" class="nav-btn">Corrente</a>
                <a href="potencia.html" class="nav-btn">Potência</a>
                <a href="queda-tensao.html" class="nav-btn">Queda Tensão</a>
                <a href="bitola-cabo.html" class="nav-btn">Bitola Cabo</a>
                <a href="disjuntor.html" class="nav-btn">Disjuntor</a>
                <a href="consumo.html" class="nav-btn">Consumo</a>
                <a href="demanda.html" class="nav-btn">Demanda</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="conversor.html" class="nav-btn active">Conversor</a>
                <a href="cargas.html" class="nav-btn">Cargas</a>
                <a href="orcamento.html" class="nav-btn">Orçamento</a>
                <a href="recibo.html" class="nav-btn">Recibo</a>
                <a href="checklist.html" class="nav-btn">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-exchange card-icon"></i>
                    <h3 class="card-title">Conversor de Unidades</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>AWG para mm²</label>
                        <input type="number" id="conv_awg" class="form-control" placeholder="Ex: 10">
                        <button onclick="convAWG()" class="btn btn-primary mt-3">Converter</button>
                        <div id="res_awg" class="result-box hidden mt-3"></div>
                    </div>
                    <div class="form-group">
                        <label>W para kW</label>
                        <input type="number" id="conv_w" class="form-control" placeholder="Ex: 2500">
                        <button onclick="convW()" class="btn btn-primary mt-3">Converter</button>
                        <div id="res_w" class="result-box hidden mt-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/scripts.js"></script>
</body>
</html>
