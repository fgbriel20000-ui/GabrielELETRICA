<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queda de Tensão | Elétrica Profissional</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="corrente.html" class="nav-btn">Corrente</a>
                <a href="potencia.html" class="nav-btn">Potência</a>
                <a href="queda-tensao.html" class="nav-btn active">Queda Tensão</a>
                <a href="bitola-cabo.html" class="nav-btn">Bitola Cabo</a>
                <a href="disjuntor.html" class="nav-btn">Disjuntor</a>
                <a href="consumo.html" class="nav-btn">Consumo</a>
                <a href="demanda.html" class="nav-btn">Demanda</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="conversor.html" class="nav-btn">Conversor</a>
                <a href="cargas.html" class="nav-btn">Cargas</a>
                <a href="orcamento.html" class="nav-btn">Orçamento</a>
                <a href="recibo.html" class="nav-btn">Recibo</a>
                <a href="checklist.html" class="nav-btn">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-line-chart card-icon"></i>
                    <h3 class="card-title">Cálculo de Queda de Tensão</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tensão do Circuito (V)</label>
                        <input type="number" id="q_tensao" value="220" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Corrente do Circuito (A)</label>
                        <input type="number" id="q_corr" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Comprimento do Cabo (m)</label>
                        <input type="number" id="q_comp" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Seção do Condutor (mm²)</label>
                        <input type="number" id="q_sec" class="form-control">
                    </div>
                </div>
                <button onclick="calcQueda()" class="btn btn-primary btn-block mt-6">
                    <i class="fa fa-calculator mr-2"></i> Calcular Queda
                </button>
                <div id="res_q" class="result-box hidden"></div>
            </div>
        </main>
    </div>
    <script src="../js/scripts.js"></script>
</body>
</html>
