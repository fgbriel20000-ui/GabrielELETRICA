<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo | Elétrica Profissional</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="corrente.html" class="nav-btn">Corrente</a>
                <a href="potencia.html" class="nav-btn">Potência</a>
                <a href="queda-tensao.html" class="nav-btn">Queda Tensão</a>
                <a href="bitola-cabo.html" class="nav-btn">Bitola Cabo</a>
                <a href="disjuntor.html" class="nav-btn">Disjuntor</a>
                <a href="consumo.html" class="nav-btn">Consumo</a>
                <a href="demanda.html" class="nav-btn">Demanda</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="conversor.html" class="nav-btn">Conversor</a>
                <a href="cargas.html" class="nav-btn">Cargas</a>
                <a href="orcamento.html" class="nav-btn">Orçamento</a>
                <a href="recibo.html" class="nav-btn active">Recibo</a>
                <a href="checklist.html" class="nav-btn">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-file-pdf-o card-icon"></i>
                    <h3 class="card-title">Gerar Recibo de Serviço</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nome do Prestador</label>
                        <input type="text" id="prestador_nome" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>CPF/CNPJ</label>
                        <input type="text" id="prestador_doc" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Endereço</label>
                        <input type="text" id="prestador_end" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Nome do Cliente</label>
                        <input type="text" id="cliente_nome" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>CPF do Cliente</label>
                        <input type="text" id="cliente_doc" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Endereço da Obra</label>
                        <input type="text" id="cliente_end" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Descrição do Serviço</label>
                        <textarea id="descricao" rows="3" class="form-control"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Valor Total (R$)</label>
                        <input type="number" id="valor_total" step="0.01" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="data_recibo" class="form-control">
                    </div>
                </div>
                <button onclick="gerarRecibo()" class="btn btn-primary btn-block mt-6">
                    <i class="fa fa-print mr-2"></i> Gerar Recibo
                </button>
                <div id="recibo_area" class="mt-6"></div>
            </div>
        </main>
    </div>
    <script src="../js/scripts.js"></script>
</body>
</html>
