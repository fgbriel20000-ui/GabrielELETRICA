<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadoras | Gabriel Eletro</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="../index.html" class="nav-btn"><i class="fa fa-home"></i> Início</a>
            <a href="calculadoras.html" class="nav-btn active"><i class="fa fa-calculator"></i> Calculadoras</a>
            <a href="metragem-cabos.html" class="nav-btn"><i class="fa fa-ruler"></i> Metragem Cabos</a>
            <a href="tabelas.html" class="nav-btn"><i class="fa fa-table"></i> Tabelas</a>
            <a href="recibo.html" class="nav-btn"><i class="fa fa-file-text"></i> Recibo</a>
        </nav>

        <main class="card glass">
            <h2 class="titulo-secao">Calculadoras Elétricas</h2>
            <div class="nav-bar" style="margin: 15px 0 25px;">
                <button class="nav-btn active" onclick="mostrarAba('corrente')">Corrente</button>
                <button class="nav-btn" onclick="mostrarAba('potencia')">Potência</button>
                <button class="nav-btn" onclick="mostrarAba('disjuntor')">Disjuntor</button>
                <button class="nav-btn" onclick="mostrarAba('bitola')">Bitola Cabo</button>
            </div>

            <div id="aba_corrente" class="conteudo-aba">
                <h3 class="subtitulo">Cálculo de Corrente Elétrica</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Potência Total (W)</label>
                        <input type="number" id="corr_pot" class="form-control" placeholder="Ex: 2200">
                    </div>
                    <div class="form-group">
                        <label>Tensão (V)</label>
                        <input type="number" id="corr_tensao" class="form-control" placeholder="Ex: 220">
                    </div>
                    <div class="form-group">
                        <label>Fator de Potência</label>
                        <input type="number" id="corr_fp" class="form-control" step="0.01" value="0.8">
                    </div>
                </div>
                <button onclick="calcularCorrente()" class="btn btn-primary btn-block">Calcular</button>
                <div id="res_corrente" class="result-box hidden"></div>
            </div>

            <div id="aba_potencia" class="conteudo-aba hidden">
                <h3 class="subtitulo">Cálculo de Potência</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tensão (V)</label>
                        <input type="number" id="pot_tensao" class="form-control" placeholder="Ex: 220">
                    </div>
                    <div class="form-group">
                        <label>Corrente (A)</label>
                        <input type="number" id="pot_corr" class="form-control" placeholder="Ex: 10">
                    </div>
                    <div class="form-group">
                        <label>Fator de Potência</label>
                        <input type="number" id="pot_fp" class="form-control" step="0.01" value="0.8">
                    </div>
                </div>
                <button onclick="calcularPotencia()" class="btn btn-primary btn-block">Calcular</button>
                <div id="res_potencia" class="result-box hidden"></div>
            </div>

            <div id="aba_disjuntor" class="conteudo-aba hidden">
                <h3 class="subtitulo">Dimensionar Disjuntor</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Corrente Calculada (A)</label>
                        <input type="number" id="disj_corr" class="form-control" placeholder="Ex: 9.5">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Circuito</label>
                        <select id="disj_tipo" class="form-control">
                            <option value="1.25">Iluminação / Tomadas (+25%)</option>
                            <option value="1.3">Motores / Indutiva (+30%)</option>
                        </select>
                    </div>
                </div>
                <button onclick="calcularDisjuntor()" class="btn btn-primary btn-block">Calcular</button>
                <div id="res_disjuntor" class="result-box hidden"></div>
            </div>

            <div id="aba_bitola" class="conteudo-aba hidden">
                <h3 class="subtitulo">Dimensionar Bitola do Cabo</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Corrente do Circuito (A)</label>
                        <input type="number" id="bit_corr" class="form-control" placeholder="Ex: 12">
                    </div>
                    <div class="form-group">
                        <label>Comprimento do Cabo (m)</label>
                        <input type="number" id="bit_comp" class="form-control" placeholder="Ex: 15">
                    </div>
                    <div class="form-group">
                        <label>Tensão (V)</label>
                        <input type="number" id="bit_tensao" class="form-control" value="220">
                    </div>
                </div>
                <button onclick="calcularBitola()" class="btn btn-primary btn-block">Calcular</button>
                <div id="res_bitola" class="result-box hidden"></div>
            </div>
        </main>
    </div>
    <script src="../JS/scripts.js"></script>
</body>
</html>
