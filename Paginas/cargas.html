<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargas | Elétrica Profissional</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="corrente.html" class="nav-btn">Corrente</a>
                <a href="potencia.html" class="nav-btn">Potência</a>
                <a href="queda-tensao.html" class="nav-btn">Queda Tensão</a>
                <a href="bitola-cabo.html" class="nav-btn">Bitola Cabo</a>
                <a href="disjuntor.html" class="nav-btn">Disjuntor</a>
                <a href="consumo.html" class="nav-btn">Consumo</a>
                <a href="demanda.html" class="nav-btn">Demanda</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="conversor.html" class="nav-btn">Conversor</a>
                <a href="cargas.html" class="nav-btn active">Cargas</a>
                <a href="orcamento.html" class="nav-btn">Orçamento</a>
                <a href="recibo.html" class="nav-btn">Recibo</a>
                <a href="checklist.html" class="nav-btn">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-plug card-icon"></i>
                    <h3 class="card-title">Dimensionamento para Cargas Específicas</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tipo de Carga</label>
                        <select id="carga_tipo" class="form-control">
                            <option value="chuveiro">Chuveiro Elétrico</option>
                            <option value="ar">Ar-Condicionado</option>
                            <option value="motor">Motor Elétrico (CV)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Potência / Potência / Potência (W ou CV)</label>
                        <input type="number" id="carga_valor" class="form-control" placeholder="Ex: 5500">
                    </div>
                    <div class="form-group">
                        <label>Tensão (V)</label>
                        <select id="carga_tensao" class="form-control">
                            <option value="127">127V</option>
                            <option value="220" selected>220V</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fator de Potência</label>
                        <input type="number" id="carga_fp" step="0.01" min="0.1" max="1" value="0.8" class="form-control">
                    </div>
                </div>
                <button onclick="calcCarga()" class="btn btn-primary btn-block mt-6">
                    <i class="fa fa-calculator mr-2"></i> Calcular
                </button>
                <div id="res_carga" class="result-box hidden"></div>
            </div>
        </main>
    </div>
    <script src="../js/scripts.js"></script>
</body>
</html>
