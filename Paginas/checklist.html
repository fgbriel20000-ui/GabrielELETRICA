<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist | Elétrica Profissional</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="calculadoras.html" class="nav-btn">Calculadoras</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="orcamento.html" class="nav-btn">Orçamento</a>
                <a href="recibo.html" class="nav-btn">Recibo</a>
                <a href="checklist.html" class="nav-btn active">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-check-square-o card-icon"></i>
                    <h3 class="card-title">Checklist de Execução e Segurança</h3>
                </div>
                <div class="space-y-6">
                    <div>
                        <h4 class="text-yellow-300 mb-3">Projeto e Normas</h4>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Segue NBR 5410 e NR-10
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Dimensionamento de cabos e disjuntores correto
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Queda de tensão dentro do limite
                        </label>
                    </div>

                    <div>
                        <h4 class="text-yellow-300 mb-3">Instalação</h4>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Eletrodutos bem fixados e sem obstruções
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Emendas dentro de caixas de passagem
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Identificação de fases, neutro e terra
                        </label>
                    </div>

                    <div>
                        <h4 class="text-yellow-300 mb-3">Segurança e Proteção</h4>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Aterramento funcional e de proteção executado
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Disjuntores e DR/DRT dimensionados corretamente
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Isolamento testado e sem falhas
                        </label>
                    </div>

                    <div>
                        <h4 class="text-yellow-300 mb-3">Finalização</h4>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Funcionamento de todos os pontos testado
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Limpeza e organização do ambiente
                        </label>
                        <label class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                            <input type="checkbox"> Entrega de diagrama e orientações ao cliente
                        </label>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../JS/scripts.js"></script>
</body>
</html>
