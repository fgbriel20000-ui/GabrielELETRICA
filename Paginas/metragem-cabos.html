<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metragem Cabos | Gabriel Eletro</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="../index.html" class="nav-btn"><i class="fa fa-home"></i> Início</a>
            <a href="calculadoras.html" class="nav-btn"><i class="fa fa-calculator"></i> Calculadoras</a>
            <a href="metragem-cabos.html" class="nav-btn active"><i class="fa fa-ruler"></i> Metragem Cabos</a>
            <a href="tabelas.html" class="nav-btn"><i class="fa fa-table"></i> Tabelas</a>
            <a href="recibo.html" class="nav-btn"><i class="fa fa-file-text"></i> Recibo</a>
        </nav>

        <main class="card glass">
            <h2 class="titulo-secao">Cálculo de Metragem de Cabos</h2>
            <p class="texto">Estimativa rápida para saber quanto cabo comprar para a obra.</p>

            <div class="form-grid">
                <div class="form-group">
                    <label>Quantidade de pontos</label>
                    <input type="number" id="qtd_pontos" class="form-control" placeholder="Ex: 15">
                </div>
                <div class="form-group">
                    <label>Média de percurso por ponto (m)</label>
                    <input type="number" id="media_percurso" class="form-control" placeholder="Ex: 8">
                </div>
                <div class="form-group">
                    <label>Folga (%)</label>
                    <input type="number" id="folga" class="form-control" value="10" placeholder="Ex: 10">
                </div>
            </div>
            <button onclick="calcularMetragem()" class="btn btn-primary btn-block">Calcular Total</button>
            <div id="res_metragem" class="result-box hidden"></div>
        </main>
    </div>
    <script src="../JS/scripts.js"></script>
</body>
</html>
