<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento | Elétrica Profissional</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">Início</a>
                <a href="calculadoras.html" class="nav-btn">Calculadoras</a>
                <a href="tabelas.html" class="nav-btn">Tabelas</a>
                <a href="orcamento.html" class="nav-btn active">Orçamento</a>
                <a href="recibo.html" class="nav-btn">Recibo</a>
                <a href="checklist.html" class="nav-btn">Checklist</a>
            </div>
        </nav>

        <main>
            <div class="glass card">
                <div class="card-header">
                    <i class="fa fa-file-text card-icon"></i>
                    <h3 class="card-title">Orçamento de Materiais e Mão de Obra</h3>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Quantidade Tomadas</label>
                        <input type="number" id="qtd_tomada" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço Unitário Tomada (R$)</label>
                        <input type="number" id="preco_tomada" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Quantidade Interruptores</label>
                        <input type="number" id="qtd_interruptor" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço Unitário Interruptor (R$)</label>
                        <input type="number" id="preco_interruptor" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Metros Cabo 1,5 mm²</label>
                        <input type="number" id="m15" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço por Metro 1,5 mm² (R$)</label>
                        <input type="number" id="preco_m15" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Metros Cabo 2,5 mm²</label>
                        <input type="number" id="m25" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço por Metro 2,5 mm² (R$)</label>
                        <input type="number" id="preco_m25" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Metros Cabo 4 mm²</label>
                        <input type="number" id="m4" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço por Metro 4 mm² (R$)</label>
                        <input type="number" id="preco_m4" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Quantidade Disjuntores</label>
                        <input type="number" id="qtd_disj" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço Unitário Disjuntor (R$)</label>
                        <input type="number" id="preco_disj" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Metros Conduíte</label>
                        <input type="number" id="qtd_conduite" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Preço por Metro Conduíte (R$)</label>
                        <input type="number" id="preco_conduite" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Mão de Obra Total (R$)</label>
                        <input type="number" id="mao" step="0.01" class="form-control" value="0">
                    </div>
                    <div class="form-group">
                        <label>Margem de Lucro (%)</label>
                        <input type="number" id="lucro" class="form-control" value="20">
                    </div>
                </div>
                <button onclick="gerarOrcamento()" class="btn btn-primary btn-block mt-6">
                    <i class="fa fa-calculator mr-2"></i> Calcular Orçamento
                </button>
                <div id="res_orc" class="result-box hidden"></div>
            </div>
        </main>
    </div>
    <script src="../JS/scripts.js"></script>
</body>
</html>
