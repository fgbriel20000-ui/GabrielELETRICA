<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orçamentos | Gabriel Eletro V2K</title>

<meta name="description"
content="Sistema de orçamentos para eletricistas.">

<link rel="stylesheet" href="../CSS/estilo.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body>

<div class="container">

<!-- CABEÇALHO -->

<header class="card glass text-center">

<i class="fa fa-money logo-icon"></i>

<h1 class="marca">

Orçamentos

</h1>

<p class="slogan">

Monte orçamentos rápidos e profissionais

</p>

</header>

<!-- MENU -->

<nav class="nav-bar">

<a href="../index.html" class="nav-btn">

<i class="fa fa-home"></i>

Início

</a>

<a href="calculadoras.html" class="nav-btn">

<i class="fa fa-calculator"></i>

Calculadoras

</a>

<a href="tabelas.html" class="nav-btn">

<i class="fa fa-table"></i>

Tabelas

</a>

<a href="recibo.html" class="nav-btn">

<i class="fa fa-file-text"></i>

Recibos

</a>

<a href="orcamentos.html" class="nav-btn active">

<i class="fa fa-money"></i>

Orçamentos

</a>

</nav>

<!-- PAINEL DE ENTRADA -->

<section class="card glass">

<h2 class="titulo-secao">

➕ Adicionar Item

</h2>

<label>Tipo</label>

<select id="tipo_item" class="form-control">

<option>Serviço</option>

<option>Material</option>

</select>

<br>

<label>Descrição</label>

<input
type="text"
id="desc_item"
class="form-control"
placeholder="Ex: Instalação de chuveiro">

<br>

<label>Quantidade</label>

<input
type="number"
id="qtd_item"
class="form-control"
value="1">

<br>

<label>Valor Unitário (R$)</label>

<input
type="number"
id="valor_item"
class="form-control"
placeholder="0.00">

<br>

<button class="btn btn-primary" onclick="adicionarItem()">

<i class="fa fa-plus"></i>

Adicionar

</button>

</section>

<!-- LISTA DE ITENS -->

<section class="card glass">

<h2 class="titulo-secao">

📋 Itens do Orçamento

</h2>

<div id="lista_itens">

<p class="texto">

Nenhum item adicionado ainda.

</p>

</div>

<hr>

<h2 class="titulo-secao">

💰 Total

</h2>

<h1 style="color:#facc15;" id="total_orcamento">

R$ 0,00

</h1>

<br>

<button class="btn btn-primary" onclick="gerarOrcamento()">

<i class="fa fa-file-text"></i>

Gerar Orçamento

</button>

<button class="btn" onclick="window.print()">

<i class="fa fa-print"></i>

Imprimir

</button>

<button class="btn" onclick="copiarOrcamento()">

<i class="fa fa-copy"></i>

Copiar

</button>

<button class="btn" onclick="limparOrcamento()">

<i class="fa fa-trash"></i>

Limpar

</button>

</section>

<!-- VISUALIZAÇÃO -->

<section class="card glass">

<h2 class="titulo-secao">

👁️ Pré-visualização

</h2>

<div id="orcamento_preview" class="glass" style="padding:25px;min-height:300px;">

<p class="texto">

O orçamento aparecerá aqui após adicionar itens.

</p>

</div>

</section>

</div>

<script src="../JS/scripts.js" defer></script>

<script>

/* ==========================
   ORÇAMENTO V2K LOGIC
========================== */

let itens = [];

function adicionarItem() {

const tipo = document.getElementById("tipo_item").value;
const desc = document.getElementById("desc_item").value;
const qtd = Number(document.getElementById("qtd_item").value);
const valor = Number(document.getElementById("valor_item").value);

if (!desc || !qtd || !valor) {
alert("Preencha todos os campos!");
return;
}

const item = {
tipo,
desc,
qtd,
valor,
total: qtd * valor
};

itens.push(item);

renderizar();

}

function renderizar() {

const lista = document.getElementById("lista_itens");

if (itens.length === 0) {
lista.innerHTML = "<p class='texto'>Nenhum item adicionado.</p>";
return;
}

let html = "";
let total = 0;

itens.forEach((item, index) => {

total += item.total;

html += `
<div class="card glass">

<p><strong>${item.tipo}</strong></p>

<p>${item.desc}</p>

<p>Qtd: ${item.qtd}</p>

<p>Valor: R$ ${item.valor.toFixed(2)}</p>

<p><strong>Total: R$ ${item.total.toFixed(2)}</strong></p>

<button class="btn" onclick="removerItem(${index})">

Remover

</button>

</div>
`;

});

document.getElementById("lista_itens").innerHTML = html;

document.getElementById("total_orcamento").innerText =
"R$ " + total.toFixed(2);

}

function removerItem(index) {

itens.splice(index, 1);
renderizar();

}

function limparOrcamento() {

itens = [];
renderizar();

document.getElementById("orcamento_preview").innerHTML =
"<p class='texto'>Orçamento limpo.</p>";

}

function copiarOrcamento() {

let texto = "ORÇAMENTO\n\n";

itens.forEach(i => {

texto += `${i.tipo} - ${i.desc} - ${i.qtd} x ${i.valor}\n`;

});

texto += "\nTOTAL: " +
document.getElementById("total_orcamento").innerText;

navigator.clipboard.writeText(texto);

alert("Copiado!");

}

function gerarOrcamento() {

let html = "<h2>ORÇAMENTO</h2><br>";

itens.forEach(i => {

html += `<p>${i.tipo} - ${i.desc} - ${i.qtd} x R$ ${i.valor.toFixed(2)} = <strong>R$ ${i.total.toFixed(2)}</strong></p>`;

});

html += `<br><h3>Total: ${document.getElementById("total_orcamento").innerText}</h3>`;

document.getElementById("orcamento_preview").innerHTML = html;

}

</script>

</body>
</html>
