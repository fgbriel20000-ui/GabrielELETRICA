<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo | Gabriel Eletro</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="../index.html" class="nav-btn"><i class="fa fa-home"></i> Início</a>
            <a href="calculadoras.html" class="nav-btn"><i class="fa fa-calculator"></i> Calculadoras</a>
            <a href="metragem-cabos.html" class="nav-btn"><i class="fa fa-ruler"></i> Metragem Cabos</a>
            <a href="tabelas.html" class="nav-btn"><i class="fa fa-table"></i> Tabelas</a>
            <a href="recibo.html" class="nav-btn active"><i class="fa fa-file-text"></i> Recibo</a>
        </nav>

        <main class="card glass">
            <h2 class="titulo-secao">Gerar Recibo de Serviço</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="cliente" class="form-control">
                </div>
                <div class="form-group">
                    <label>Endereço da Obra</label>
                    <input type="text" id="endereco" class="form-control">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Descrição do Serviço</label>
                    <textarea id="servico" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label>Valor Total (R$)</label>
                    <input type="number" id="valor" class="form-control" step="0.01">
                </div>
            </div>
            <button onclick="gerarRecibo()" class="btn btn-primary btn-block">Gerar Recibo</button>
            <div id="recibo_area" class="mt-4"></div>
            <button onclick="window.print()" class="btn btn-primary btn-block mt-4">Imprimir / Salvar PDF</button>
        </main>
    </div>
    <script src="../JS/scripts.js"></script>
</body>
</html>
