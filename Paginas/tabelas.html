<body>
    <div class="container">
        <nav class="nav-bar">
            <a href="../index.html" class="nav-btn"><i class="fa fa-home"></i> Início</a>

        <main class="card glass">
            <h2 class="titulo-secao">Tabelas NBR 5410</h2>
            <div class="table-container">
                <h3 class="subtitulo">Capacidade de Corrente - Cobre</h3>
                <table>
                    <tr><th>Seção (mm²)</th><th>Corrente (A)</th></tr>
                    <tr><td>1,5</td><td>15,5</td></tr>
                    <tr><td>2,5</td><td>21</td></tr>
                    <tr><td>4</td><td>28</td></tr>
                    <tr><td>6</td><td>36</td></tr>
                    <tr><td>10</td><td>50</td></tr>
                    <tr><td>16</td><td>68</td></tr>
                    <tr><td>25</td><td>89</td></tr>
                </table>
            </div>

            <div class="table-container" style="margin-top:30px;">
                <h3 class="subtitulo">Limites de Queda de Tensão</h3>
                <table>
                    <tr><th>Tipo de Circuito</th><th>Queda Máxima (%)</th></tr>
                    <tr><td>Iluminação e Tomadas</td><td>5%</td></tr>
                    <tr><td>Alimentador Geral</td><td>3%</td></tr>
                </table>
            </div>
        </main>
    </div>
