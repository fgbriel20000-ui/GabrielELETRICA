<!-- =========================================================
     GS ELÉTRICA — MODAL PADRÃO
     ========================================================= -->
<style>
    .gs-modal-fundo {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(11, 31, 58, 0.55);
        z-index: 400;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }
    .gs-modal-fundo.gs-visivel { display: flex; }

    .gs-modal-caixa {
        background-color: var(--gs-fundo-card);
        border-radius: var(--gs-raio);
        width: 100%;
        max-width: 520px;
        max-height: 88vh;
        overflow-y: auto;
        padding: 1.75rem;
        box-shadow: var(--gs-sombra-media);
    }

    .gs-modal-topo {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--gs-borda);
    }

    .gs-modal-titulo { font-size: 1.15rem; }

    .gs-modal-fechar {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--gs-texto-claro);
        line-height: 1;
        width: 32px; height: 32px;
    }
    .gs-modal-fechar:hover { color: var(--gs-erro); }

    .gs-modal-rodape {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
        padding-top: 1rem;
        margin-top: 1rem;
        border-top: 1px solid var(--gs-borda);
    }
</style>

<div class="gs-modal-fundo" id="gs-modal">
    <div class="gs-modal-caixa">
        <div class="gs-modal-topo">
            <h3 class="gs-modal-titulo" id="gs-modal-titulo">Título</h3>
            <button type="button" class="gs-modal-fechar" onclick="fecharModalGS()">&times;</button>
        </div>
        <div id="gs-modal-corpo"></div>
        <div class="gs-modal-rodape" id="gs-modal-rodape"></div>
    </div>
</div>

<script>
    function abrirModalGS(titulo, corpoHtml, rodapeHtml = '') {
        document.getElementById('gs-modal-titulo').textContent = titulo;
        document.getElementById('gs-modal-corpo').innerHTML = corpoHtml;
        document.getElementById('gs-modal-rodape').innerHTML = rodapeHtml;
        document.getElementById('gs-modal').classList.add('gs-visivel');
    }

    function fecharModalGS() {
        document.getElementById('gs-modal').classList.remove('gs-visivel');
    }

    document.getElementById('gs-modal')?.addEventListener('click', function (e) {
        if (e.target === this) fecharModalGS();
    });
</script>
