<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Elétrica | Inicializando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .loading-container {
            text-align: center;
            max-width: 320px;
            width: 100%;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: #ff7a00;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333333;
            border-top: 4px solid #ff7a00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 15px rgba(255, 122, 0, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #cccccc;
        }

        .loading-bar {
            width: 100%;
            height: 6px;
            background-color: #222222;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff7a00, #ff9a3c);
            border-radius: 3px;
            width: 0%;
            animation: progressAnimation 1.5s ease-in-out forwards;
        }

        @keyframes progressAnimation {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .powered-by {
            font-size: 0.85rem;
            color: #666666;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">GS ELÉTRICA</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Inicializando Sistema V2K</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        <div class="powered-by">Desenvolvido por Gabriel</div>
    </div>
</body>
</html>
