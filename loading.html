<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
    }

    .container-loading {
        text-align: center;
        padding: 2rem;
    }

    .icone-loading {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: inline-block;
        animation: pulso 1.5s ease-in-out infinite;
    }

    @keyframes pulso {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.8; }
    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(37, 99, 235, 0.2);
        border-top-color: #2563eb;
        border-radius: 50%;
        margin: 1.5rem auto;
        animation: girar 0.8s linear infinite;
    }

    @keyframes girar {
        to { transform: rotate(360deg); }
    }

    .texto-loading {
        font-size: 1.2rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
    }

    .subtexto-loading {
        font-size: 0.9rem;
        color: #94a3b8;
    }

    .barra-carregamento {
        width: 250px;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px;
        margin: 1.5rem auto 0;
        overflow: hidden;
    }

    .progresso {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        border-radius: 3px;
        animation: carregar 2s ease-out forwards;
    }

    @keyframes carregar {
        to { width: 100%; }
    }
</style>

<div class="container-loading">
    <div class="icone-loading">⚡</div>
    <h1 class="texto-loading">GS Elétrica V2K</h1>
    <p class="subtexto-loading">Carregando sistema...</p>
    
    <div class="spinner"></div>
    
    <div class="barra-carregamento">
        <div class="progresso"></div>
    </div>
</div>

<script>
    // Função para fechar automaticamente após carregamento
    function finalizarCarregamento(tempoEspera = 2000) {
        setTimeout(() => {
            window.location.href = './index.html';
        }, tempoEspera);
    }

    // Inicia redirecionamento automático
    finalizarCarregamento();
</script>
