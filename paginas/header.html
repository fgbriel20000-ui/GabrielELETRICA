<style>
    header.cabecalho-principal {
        width: 100%;
        height: 70px;
        position: fixed;
        top: 0;
        left: 0;
        background-color: var(--cor-fundo-card);
        border-bottom: 1px solid var(--cor-borda);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        z-index: 160;
        box-sizing: border-box;
    }

    .cabecalho-esquerda {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .btn-menu {
        display: none;
        background: transparent;
        border: none;
        font-size: 1.5rem;
        color: var(--cor-texto);
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 50%;
        transition: background 0.2s;
    }

    .btn-menu:hover {
        background-color: rgba(37, 99, 235, 0.08);
    }

    .marca-projeto {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--cor-destaque);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
    }

    .area-pesquisa {
        display: flex;
        align-items: center;
    }

    .area-pesquisa input {
        padding: 0.6rem 1rem;
        border: 1px solid var(--cor-borda);
        border-radius: 20px;
        background-color: var(--cor-fundo);
        color: var(--cor-texto);
        width: 260px;
        font-size: 0.9rem;
    }

    .area-pesquisa input:focus {
        outline: none;
        border-color: var(--cor-destaque);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .area-acoes {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .btn-cabecalho {
        background: transparent;
        border: none;
        font-size: 1.3rem;
        color: var(--cor-texto);
        cursor: pointer;
        padding: 0.6rem;
        border-radius: 50%;
        transition: background 0.2s;
    }

    .btn-cabecalho:hover {
        background-color: rgba(37, 99, 235, 0.08);
    }

    /* Modo Escuro */
    .dark-mode header.cabecalho-principal {
        background-color: #1e293b;
    }

    /* Responsividade */
    @media (max-width: 768px) {
        .btn-menu {
            display: block;
        }

        .area-pesquisa {
            display: none;
        }

        header.cabecalho-principal {
            padding: 0 1rem;
        }
    }
</style>

<header class="cabecalho-principal">
    <div class="cabecalho-esquerda">
        <button class="btn-menu" id="btn-menu-lateral" aria-label="Abrir menu">☰</button>
        <a href="../index.html" class="marca-projeto">⚡ GS Elétrica V2K</a>
    </div>

    <div class="area-pesquisa">
        <input type="search" placeholder="Pesquisar no sistema..." aria-label="Campo de pesquisa">
    </div>

    <div class="area-acoes">
        <button class="btn-cabecalho" id="alternar-tema" aria-label="Alternar tema">🌙</button>
        <button class="btn-cabecalho" aria-label="Perfil do usuário">👤</button>
    </div>
</header>

<script>
    // Controle do menu lateral
    document.getElementById('btn-menu-lateral')?.addEventListener('click', () => {
        document.getElementById('barra-lateral')?.classList.toggle('visivel');
    });

    // Sincroniza tema salvo
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('gs-tema') === 'escuro') {
            document.body.classList.add('dark-mode');
        }
    });

    document.getElementById('alternar-tema')?.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('gs-tema', document.body.classList.contains('dark-mode') ? 'escuro' : 'claro');
    });
</script>
