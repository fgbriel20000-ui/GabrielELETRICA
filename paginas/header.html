<style>
    header.cabecalho-principal {
        width: 100%;
        height: 70px;
        position: fixed;
        top: 0;
        left: 0;
        background-color: #000000;
        border-bottom: 2px solid #ff7a00;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        z-index: 160;
        box-sizing: border-box;
    }

    .cabecalho-esquerda {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .btn-menu {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        color: #ffffff;
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 50%;
        transition: all 0.2s;
    }

    .btn-menu:hover {
        background-color: rgba(255, 122, 0, 0.15);
        color: #ff7a00;
    }

    .marca-projeto {
        font-size: 1.25rem;
        font-weight: 800;
        color: #ff7a00;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
    }

    .area-pesquisa input {
        padding: 0.6rem 1rem;
        border: 1px solid #333;
        border-radius: 25px;
        background-color: #1a1a1a;
        color: #fff;
        width: 260px;
    }

    .area-pesquisa input:focus {
        border-color: #ff7a00;
        box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.2);
    }

    .btn-cabecalho {
        background: transparent;
        border: none;
        font-size: 1.3rem;
        color: #fff;
        cursor: pointer;
        padding: 0.6rem;
        border-radius: 50%;
        transition: all 0.2s;
    }

    .btn-cabecalho:hover {
        background-color: rgba(255, 122, 0, 0.15);
        color: #ff7a00;
    }

    @media (max-width: 768px) {
        .btn-menu { display: block; }
        .area-pesquisa { display: none; }
    }
</style>

<header class="cabecalho-principal">
    <div class="cabecalho-esquerda">
        <button class="btn-menu" id="btn-menu-lateral" aria-label="Abrir menu">☰</button>
        <a href="../index.html" class="marca-projeto">⚡ GS Elétrica V2K</a>
    </div>

    <div class="area-pesquisa">
        <input type="search" placeholder="Pesquisar no sistema..." aria-label="Campo de pesquisa">
    </div>

    <div class="area-acoes">
        <button class="btn-cabecalho" id="alternar-tema" aria-label="Alternar tema">🌙</button>
        <button class="btn-cabecalho" aria-label="Perfil do usuário">👤</button>
    </div>
</header>
