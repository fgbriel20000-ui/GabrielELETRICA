<style>
    #modal-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 1rem;
        box-sizing: border-box;
    }

    .modal-conteudo {
        background-color: #1e1e1e;
        border: 1px solid #333;
        border-radius: 10px;
        max-width: 420px;
        width: 100%;
        padding: 1.8rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    .modal-titulo {
        color: #ff7a00;
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 1rem;
    }

    .modal-texto {
        color: #dddddd;
        line-height: 1.6;
        margin-bottom: 1.5rem;
    }

    .modal-botoes {
        display: flex;
        gap: 0.8rem;
        justify-content: flex-end;
    }

    .btn-modal {
        padding: 0.7rem 1.4rem;
        border-radius: 8px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .btn-modal.secundario {
        background-color: #333333;
        color: #ffffff;
    }

    .btn-modal.secundario:hover {
        background-color: #444444;
    }

    .btn-modal.principal {
        background: linear-gradient(135deg, #ff7a00, #e65c00);
        color: #000000;
        box-shadow: 0 3px 10px rgba(255, 122, 0, 0.35);
    }

    .btn-modal.principal:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 122, 0, 0.45);
    }
</style>

<div id="modal-container" style="display: none;">
    <div class="modal-conteudo">
        <h3 class="modal-titulo" id="modal-titulo">Aviso</h3>
        <p class="modal-texto" id="modal-mensagem"></p>
        <div class="modal-botoes">
            <button class="btn-modal secundario" onclick="fecharModal()">Fechar</button>
            <button class="btn-modal principal" id="btn-modal-acao" style="display: none;">Confirmar</button>
        </div>
    </div>
</div>

<script>
    function abrirModal(titulo, mensagem, textoBotaoAcao = null, funcaoAcao = null) {
        document.getElementById('modal-titulo').textContent = titulo;
        document.getElementById('modal-mensagem').textContent = mensagem;
        const btnAcao = document.getElementById('btn-modal-acao');
        
        if (textoBotaoAcao && funcaoAcao) {
            btnAcao.textContent = textoBotaoAcao;
            btnAcao.style.display = 'block';
            btnAcao.onclick = () => { funcaoAcao(); fecharModal(); };
        } else {
            btnAcao.style.display = 'none';
        }

        document.getElementById('modal-container').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modal-container').style.display = 'none';
    }
</script>
