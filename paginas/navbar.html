<style>
    /* ESTILOS PADRÃO DA BARRA SUPERIOR */
    .navbar {
        height: 70px;
        width: 100%;
        position: fixed;
        top: 0;
        left: 0;
        background-color: var(--cor-fundo-card);
        border-bottom: 1px solid var(--cor-borda);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        z-index: 160;
        box-sizing: border-box;
    }

    .navbar-logo {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--cor-destaque);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .navbar-esquerda {
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .btn-menu-mobile {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--cor-texto);
        cursor: pointer;
        padding: 0.5rem;
    }

    .navbar-direita {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .navbar .search-box {
        position: relative;
    }

    .navbar .search-box input {
        padding: 0.6rem 1rem;
        border: 1px solid var(--cor-borda);
        border-radius: 20px;
        background-color: var(--cor-fundo);
        color: var(--cor-texto);
        width: 260px;
        font-size: 0.9rem;
    }

    .navbar .search-box input:focus {
        outline: none;
        border-color: var(--cor-destaque);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn-icone {
        background: none;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
        padding: 0.6rem;
        border-radius: 50%;
        transition: background-color 0.2s;
        color: var(--cor-texto);
    }

    .btn-icone:hover {
        background-color: rgba(37, 99, 235, 0.08);
    }

    /* Ajuste para modo escuro */
    .dark-mode .navbar {
        background-color: #1e293b;
    }

    /* Responsividade para telas menores */
    @media (max-width: 768px) {
        .btn-menu-mobile {
            display: block;
        }

        .navbar .search-box {
            display: none;
        }

        .navbar {
            padding: 0 1rem;
        }
    }
</style>

<!-- ESTRUTURA DA BARRA DE NAVEGAÇÃO -->
<header class="navbar">
    <div class="navbar-esquerda">
        <button class="btn-menu-mobile" onclick="alternarSidebar()">☰</button>
        <a href="../index.html" class="navbar-logo">⚡ GS Elétrica V2K</a>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Pesquisar...">
    </div>

    <div class="navbar-direita">
        <button class="btn-icone btn-theme" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
        <button class="btn-icone" onclick="window.location.href='perfil.html'">👤</button>
    </div>
</header>

<script>
    // Função para integrar com a sidebar já criada
    function alternarSidebar() {
        if (typeof alternarSidebarComponente === 'function') {
            alternarSidebarComponente();
        } else {
            document.getElementById('barra-lateral').classList.toggle('visivel');
        }
    }

    // Sincroniza estado do botão de tema com configuração salva
    document.addEventListener('DOMContentLoaded', () => {
        const temaSalvo = localStorage.getItem('gs-tema');
        if (temaSalvo === 'escuro') {
            document.body.classList.add('dark-mode');
        }
    });
</script>
